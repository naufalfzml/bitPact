schema: spec-driven

# Konteks Proyek Global untuk Asisten AI & Developer
context: |
  Kamu sedang mengerjakan bitPatch: Generalized Tournament & Campaign Maker berbasis Web3.
  
  Tumpukan Teknologi (Tech Stack):
  - Smart Contract: Solidity, Foundry (Anvil / Celo Alfajores Testnet)
  - Backend: Node.js (Express.js) & Supabase PostgreSQL (Cron Scheduler)
  - Frontend: Next.js, Wagmi, RainbowKit Light (Opera MiniPay Integration)
  
  Integrasi Celo MCP (Model Context Protocol):
  Platform ini didukung oleh Celo MCP Server yang menyediakan perkakas interaksi blockchain Celo:
  - get_network_status & get_gas_fee_data: Untuk estimasi biaya gas EIP-1559 Celo secara presisi.
  - get_celo_balances & get_token_balance: Untuk memverifikasi saldo cUSD (MiniPay) dan CELO peserta secara real-time.
  - call_contract_function & estimate_contract_gas: Untuk membaca data turnamen di BitPatchVault.sol secara off-chain, dan mensimulasikan transaksi deposit/refund sebelum dieksekusi.
  - get_transaction & get_block: Untuk mengaudit status transaksi pendaftaran, klaim hadiah, dan pengembalian dana darurat.
  
  Aturan Desain & Identitas Visual Terikat (MANDATORY):
  - Tema Estetika: Minimalist 8-Bit Retro / Pixel Art dengan tata letak geometris tegas.
  - Logo berupa monogram atau siluet piksel geometris murni tanpa teks (text-free).
  - PENTING: Antarmuka UI SAMA SEKALI tidak boleh menggunakan ikon atau bentuk panah apa pun (NO ARROWS/CHEVRONS).

  Alur Kerja Git & Vibe Coding (MANDATORY GIT WORKFLOW):
  Platform ini menerapkan isolasi AI Agent untuk menjaga branch pengembangan utama (`dev`) tetap steril:
  1. Branch `dev` bersifat bersih (steril dari operasional AI). Seluruh berkas `.agent/`, `.agents/`, dan `openspec/` diabaikan dalam `.gitignore` di branch `dev`.
  2. Branch `setup/ai-agent` adalah base branch untuk AI. Semua fitur baru yang dikerjakan bersama AI Agent wajib dibuat bercabang dari `setup/ai-agent` (contoh: `feat/nama-fitur-ai`).
  3. Selama Vibe Coding: AI Agent akan menulis kode, memperbarui spesifikasi (`openspec/`), dan melacak tugas di branch fitur tersebut.
  4. Penggabungan Fitur (Merge to dev): Setelah tugas selesai dan di-archive (`/opsx-archive`), gabungkan HANYA kode aplikasi (seperti `/src`, `/contracts`, `/docs`) ke branch `dev`. PENTING: Hindari melakukan commit folder `.agent/` dan `openspec/` ke branch `dev`.
  5. Sinkronisasi Balik (Sync back): Setelah branch `dev` terupdate, segera merge branch `dev` kembali ke `setup/ai-agent` agar AI memiliki basis kode terbaru tanpa merusak folder konfigurasi AI lokal.


# Aturan khusus per-artifact untuk konsistensi kualitas spesifikasi
rules:
  specs:
    - "Setiap skenario wajib menggunakan struktur GIVEN / WHEN / THEN secara lengkap dan eksplisit."
    - "Setiap requirement harus memiliki minimal satu skenario dengan tepat 4 hashtag (#### Scenario:)."
  tasks:
    - "Tugas harus sangat terperinci (granular) dan ditulis dalam Bahasa Indonesia yang sistematis."
    - "Setiap tugas wajib menggunakan format checkbox trackable - [ ]."

